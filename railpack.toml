[options]
installCmd = "pnpm install --no-frozen-lockfile"
# Each app reads its own dedicated base-path env var (MARKETPLACE_BASE_PATH /
# ADMIN_BASE_PATH) with the correct default baked in, so a shared/global
# `BASE_PATH` variable set on the platform can never leak between builds.
buildCmd = "pnpm --filter @workspace/movie-marketplace run build && pnpm --filter @workspace/admin-dashboard run build && pnpm --filter @workspace/api-server run build"
startCmd = "node artifacts/api-server/dist/index.mjs"

[phases.setup]
nixPkgs = ["nodejs_20", "nodePackages.pnpm"]
