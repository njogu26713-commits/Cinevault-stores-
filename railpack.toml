[build]
nixPkgs = ["nodejs_20"]

[build.packageManager]
name = "pnpm"
version = "10"

[build.phases.install]
cmds = ["pnpm install --frozen-lockfile"]

[build.phases.build]
cmds = [
  "PORT=5000 BASE_PATH=/ pnpm --filter @workspace/movie-marketplace run build",
  "BASE_PATH=/admin/ pnpm --filter @workspace/admin-dashboard run build",
  "pnpm --filter @workspace/api-server run build"
]

[start]
cmd = "node artifacts/api-server/dist/index.mjs"

