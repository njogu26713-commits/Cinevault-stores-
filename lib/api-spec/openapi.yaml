openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Movie Marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: movies
    description: Movie catalog
  - name: series
    description: TV series catalog
  - name: orders
    description: Orders and purchases
  - name: payments
    description: M-Pesa payment processing
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /movies:
    get:
      operationId: listMovies
      tags: [movies]
      summary: List all movies
      parameters:
        - name: genre
          in: query
          schema:
            type: string
        - name: quality
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Movie list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieListResponse"
    post:
      operationId: createMovie
      tags: [admin]
      summary: Create a movie (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"

  /movies/featured:
    get:
      operationId: listFeaturedMovies
      tags: [movies]
      summary: Get featured/hero movies
      responses:
        "200":
          description: Featured movies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Movie"

  /movies/genres:
    get:
      operationId: listGenres
      tags: [movies]
      summary: Get all available genres
      responses:
        "200":
          description: Genre list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /movies/stats:
    get:
      operationId: getMovieStats
      tags: [movies]
      summary: Get catalog stats
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MovieStats"

  /movies/{id}:
    get:
      operationId: getMovie
      tags: [movies]
      summary: Get a single movie
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Movie
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
        "404":
          description: Not found
    put:
      operationId: updateMovie
      tags: [admin]
      summary: Update a movie (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MovieInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Movie"
    delete:
      operationId: deleteMovie
      tags: [admin]
      summary: Delete a movie (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /series:
    get:
      operationId: listSeries
      tags: [series]
      summary: List all series
      parameters:
        - name: genre
          in: query
          schema:
            type: string
        - name: quality
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Series list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SeriesListResponse"
    post:
      operationId: createSeries
      tags: [admin]
      summary: Create a series (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeriesInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Series"

  /series/featured:
    get:
      operationId: listFeaturedSeries
      tags: [series]
      summary: Get featured series
      responses:
        "200":
          description: Featured series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Series"

  /series/genres:
    get:
      operationId: listSeriesGenres
      tags: [series]
      summary: Get all series genres
      responses:
        "200":
          description: Genre list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /series/{id}:
    get:
      operationId: getSeries
      tags: [series]
      summary: Get a single series with full season/episode data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Series
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Series"
        "404":
          description: Not found
    put:
      operationId: updateSeries
      tags: [admin]
      summary: Update a series (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SeriesInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Series"
    delete:
      operationId: deleteSeries
      tags: [admin]
      summary: Delete a series (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /orders:
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create an order and initiate M-Pesa payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OrderInput"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order status (poll for payment/delivery)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/user/{telegramUsername}:
    get:
      operationId: getUserOrders
      tags: [orders]
      summary: Get all orders for a Telegram user
      parameters:
        - name: telegramUsername
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"

  /payments/mpesa/callback:
    post:
      operationId: mpesaCallback
      tags: [payments]
      summary: M-Pesa STK Push callback
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MpesaCallbackInput"
      responses:
        "200":
          description: OK

  /payments/mpesa/status/{checkoutRequestId}:
    get:
      operationId: getMpesaStatus
      tags: [payments]
      summary: Query M-Pesa STK push status
      parameters:
        - name: checkoutRequestId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentStatus"

  # ── ADMIN ENDPOINTS ──────────────────────────────────────────────────────────

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Dashboard overview stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/orders:
    get:
      operationId: listAdminOrders
      tags: [admin]
      summary: List all orders (admin)
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: paymentStatus
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Paginated orders
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminOrderListResponse"

  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List users aggregated from orders
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserListResponse"

  /admin/movies/{id}/upload-file:
    post:
      operationId: uploadMovieFile
      tags: [admin]
      summary: Upload a movie file to Telegram and save the file_id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MovieFileUpload"
      responses:
        "200":
          description: Upload result with Telegram file_id
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TelegramUploadResult"

  /admin/settings:
    get:
      operationId: getAdminSettings
      tags: [admin]
      summary: Get admin/system settings
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"
    put:
      operationId: updateAdminSettings
      tags: [admin]
      summary: Update admin/system settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminSettings"

  /admin/ai/generate-description:
    post:
      operationId: aiGenerateDescription
      tags: [admin]
      summary: AI-generate a movie/series description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiDescriptionRequest"
      responses:
        "200":
          description: Generated description
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTextResult"

  /admin/ai/generate-tags:
    post:
      operationId: aiGenerateTags
      tags: [admin]
      summary: AI-generate tags and keywords for a movie/series
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiTagsRequest"
      responses:
        "200":
          description: Generated tags
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiTagsResult"

  /admin/ai/analytics:
    get:
      operationId: getAiAnalytics
      tags: [admin]
      summary: AI analytics - popular genres, best sellers, revenue trends
      responses:
        "200":
          description: Analytics insights
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAnalytics"

  /admin/ai/recommendations:
    get:
      operationId: getAiRecommendations
      tags: [admin]
      summary: AI recommendations for featuring movies/series
      responses:
        "200":
          description: Featured movie recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiRecommendations"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Movie:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        posterUrl:
          type: string
        bannerUrl:
          type: ["string", "null"]
        youtubeTrailerId:
          type: ["string", "null"]
        genre:
          type: array
          items:
            type: string
        duration:
          type: string
        quality:
          type: string
          enum: [720p, 1080p, 4K]
        fileSize:
          type: string
        price:
          type: number
        featured:
          type: boolean
        rating:
          type: ["number", "null"]
        year:
          type: integer
        telegramFileId:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - posterUrl
        - genre
        - duration
        - quality
        - fileSize
        - price
        - featured
        - year
        - createdAt

    MovieInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        posterUrl:
          type: string
        bannerUrl:
          type: ["string", "null"]
        youtubeTrailerId:
          type: ["string", "null"]
        genre:
          type: array
          items:
            type: string
        duration:
          type: string
        quality:
          type: string
          enum: [720p, 1080p, 4K]
        fileSize:
          type: string
        price:
          type: number
        featured:
          type: boolean
        rating:
          type: ["number", "null"]
        year:
          type: integer
        telegramFileId:
          type: ["string", "null"]
      required:
        - title
        - description
        - posterUrl
        - genre
        - duration
        - quality
        - fileSize
        - price
        - year

    MovieListResponse:
      type: object
      properties:
        movies:
          type: array
          items:
            $ref: "#/components/schemas/Movie"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - movies
        - total
        - page
        - totalPages

    MovieStats:
      type: object
      properties:
        total:
          type: integer
        byGenre:
          type: object
          additionalProperties:
            type: integer
        byQuality:
          type: object
          additionalProperties:
            type: integer
      required:
        - total
        - byGenre
        - byQuality

    Episode:
      type: object
      properties:
        episodeNumber:
          type: integer
        title:
          type: string
        duration:
          type: string
        telegramFileId:
          type: ["string", "null"]
      required:
        - episodeNumber
        - title
        - duration

    Season:
      type: object
      properties:
        seasonNumber:
          type: integer
        episodes:
          type: array
          items:
            $ref: "#/components/schemas/Episode"
      required:
        - seasonNumber
        - episodes

    Series:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        posterUrl:
          type: string
        bannerUrl:
          type: ["string", "null"]
        youtubeTrailerId:
          type: ["string", "null"]
        genre:
          type: array
          items:
            type: string
        quality:
          type: string
          enum: [720p, 1080p, 4K]
        rating:
          type: ["number", "null"]
        year:
          type: integer
        status:
          type: string
          enum: [Ongoing, Completed, Cancelled]
        featured:
          type: boolean
        totalSeasons:
          type: integer
        totalEpisodes:
          type: integer
        pricePerSeason:
          type: number
        seasons:
          type: array
          items:
            $ref: "#/components/schemas/Season"
        createdAt:
          type: string
      required:
        - id
        - title
        - description
        - posterUrl
        - genre
        - quality
        - year
        - status
        - featured
        - totalSeasons
        - totalEpisodes
        - pricePerSeason
        - seasons
        - createdAt

    SeriesInput:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        posterUrl:
          type: string
        bannerUrl:
          type: ["string", "null"]
        youtubeTrailerId:
          type: ["string", "null"]
        genre:
          type: array
          items:
            type: string
        quality:
          type: string
          enum: [720p, 1080p, 4K]
        rating:
          type: ["number", "null"]
        year:
          type: integer
        status:
          type: string
          enum: [Ongoing, Completed, Cancelled]
        featured:
          type: boolean
        seasons:
          type: array
          items:
            $ref: "#/components/schemas/Season"
        pricePerSeason:
          type: number
      required:
        - title
        - description
        - posterUrl
        - genre
        - quality
        - year
        - pricePerSeason

    SeriesListResponse:
      type: object
      properties:
        series:
          type: array
          items:
            $ref: "#/components/schemas/Series"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - series
        - total
        - page
        - totalPages

    Order:
      type: object
      properties:
        id:
          type: string
        movieId:
          type: string
        movieTitle:
          type: string
        moviePosterUrl:
          type: string
        telegramUsername:
          type: string
        phone:
          type: string
        amount:
          type: number
        status:
          type: string
          enum: [pending, payment_initiated, payment_confirmed, delivering, delivered, failed]
        paymentStatus:
          type: string
          enum: [pending, initiated, confirmed, failed]
        checkoutRequestId:
          type: ["string", "null"]
        merchantRequestId:
          type: ["string", "null"]
        mpesaReceiptNumber:
          type: ["string", "null"]
        deliveredAt:
          type: ["string", "null"]
        failureReason:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - movieId
        - movieTitle
        - moviePosterUrl
        - telegramUsername
        - phone
        - amount
        - status
        - paymentStatus
        - createdAt
        - updatedAt

    OrderInput:
      type: object
      properties:
        movieId:
          type: string
        telegramUsername:
          type: string
        phone:
          type: string
      required:
        - movieId
        - telegramUsername
        - phone

    MpesaCallbackInput:
      type: object
      properties:
        Body:
          type: object
      required:
        - Body

    PaymentStatus:
      type: object
      properties:
        status:
          type: string
        resultCode:
          type: ["string", "null"]
        resultDesc:
          type: ["string", "null"]
      required:
        - status

    # ── ADMIN SCHEMAS ──────────────────────────────────────────────────────────

    AdminStats:
      type: object
      properties:
        totalMovies:
          type: integer
        totalSeries:
          type: integer
        totalOrders:
          type: integer
        totalRevenue:
          type: number
        deliveredOrders:
          type: integer
        pendingOrders:
          type: integer
        failedOrders:
          type: integer
        recentOrders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        revenueByDay:
          type: array
          items:
            $ref: "#/components/schemas/RevenueByDay"
        topMovies:
          type: array
          items:
            $ref: "#/components/schemas/TopMovie"
      required:
        - totalMovies
        - totalSeries
        - totalOrders
        - totalRevenue
        - deliveredOrders
        - pendingOrders
        - failedOrders
        - recentOrders
        - revenueByDay
        - topMovies

    RevenueByDay:
      type: object
      properties:
        date:
          type: string
        revenue:
          type: number
        orders:
          type: integer
      required:
        - date
        - revenue
        - orders

    TopMovie:
      type: object
      properties:
        movieId:
          type: string
        movieTitle:
          type: string
        moviePosterUrl:
          type: string
        totalSales:
          type: integer
        totalRevenue:
          type: number
      required:
        - movieId
        - movieTitle
        - moviePosterUrl
        - totalSales
        - totalRevenue

    AdminOrderListResponse:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: "#/components/schemas/Order"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - orders
        - total
        - page
        - totalPages

    AdminUser:
      type: object
      properties:
        telegramUsername:
          type: string
        phone:
          type: string
        totalOrders:
          type: integer
        totalSpent:
          type: number
        lastOrderAt:
          type: string
        deliveredOrders:
          type: integer
      required:
        - telegramUsername
        - phone
        - totalOrders
        - totalSpent
        - lastOrderAt
        - deliveredOrders

    AdminUserListResponse:
      type: object
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/AdminUser"
        total:
          type: integer
        page:
          type: integer
        totalPages:
          type: integer
      required:
        - users
        - total
        - page
        - totalPages

    MovieFileUpload:
      type: object
      properties:
        fileName:
          type: string
      required:
        - fileName

    TelegramUploadResult:
      type: object
      properties:
        telegramFileId:
          type: string
        fileSize:
          type: integer
        fileName:
          type: string
      required:
        - telegramFileId
        - fileSize
        - fileName

    AdminSettings:
      type: object
      properties:
        mpesaConsumerKey:
          type: string
        mpesaConsumerSecret:
          type: string
        mpesaShortcode:
          type: string
        mpesaPasskey:
          type: string
        mpesaCallbackUrl:
          type: string
        telegramBotToken:
          type: string
        telegramChannelId:
          type: string
        mongoUri:
          type: string
        adminUsername:
          type: string
      required:
        - adminUsername

    AdminSettingsInput:
      type: object
      properties:
        mpesaConsumerKey:
          type: string
        mpesaConsumerSecret:
          type: string
        mpesaShortcode:
          type: string
        mpesaPasskey:
          type: string
        mpesaCallbackUrl:
          type: string
        telegramBotToken:
          type: string
        telegramChannelId:
          type: string
        mongoUri:
          type: string
        adminUsername:
          type: string
        currentPassword:
          type: string
        newPassword:
          type: string

    AiDescriptionRequest:
      type: object
      properties:
        title:
          type: string
        genre:
          type: array
          items:
            type: string
        year:
          type: integer
        existingDescription:
          type: ["string", "null"]
      required:
        - title
        - genre
        - year

    AiTextResult:
      type: object
      properties:
        text:
          type: string
      required:
        - text

    AiTagsRequest:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        genre:
          type: array
          items:
            type: string
        year:
          type: integer
      required:
        - title
